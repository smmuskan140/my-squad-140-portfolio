<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kalvium Squad UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="squad.css ">
</head>

<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">K</div>

    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Mentors</a>
      <a href="#">Kalvians</a>
      <a href="#">Events</a>
      <a href="#">Contact</a>
    </div>

    <div class="right-icons">
      <input type="text" class="search" placeholder="Inquire...">
      <div class="toggle"></div>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Kalvium Squad 140</h1>
    <div class="big-logo">K</div>

    <div class="cards">
      <div class="card">Built time</div>
      <div class="card">Team Members</div>
      <div class="card">Number of projects</div>
    </div>
  </div>

  <!-- BLOBS -->
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <!-- SECTION -->
  <div class="section">Our Mentors</div>

  <!-- JS -->
  <script src="squad.js"></script>

</body>
</html>
